name: animal_quiz_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audioplayers: ^5.2.1
  confetti: ^0.8.0
  shared_preferences: ^2.2.2 # <--- Thêm dòng này để lưu tên người chơi
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.1
  cached_network_image: ^3.3.1 # <--- Thêm thư viện lưu bộ nhớ đệm hình ảnh
  flutter_cache_manager: ^3.3.2 # <--- Thêm thư viện lưu bộ nhớ đệm âm thanh

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/